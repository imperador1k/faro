version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: myduolingo_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: myduolingo
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d myduolingo"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
