version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Europe/Lisbon
    open-pull-requests-limit: 10
    versioning-strategy: increase
    labels:
      - dependencies
      - automated
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: scope
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
        update-types:
          - minor
          - patch
      nextjs:
        patterns:
          - "next"
          - "eslint-config-next"
        update-types:
          - minor
          - patch
      tauri:
        patterns:
          - "@tauri-apps/*"
        update-types:
          - minor
          - patch
      capacitor:
        patterns:
          - "@capacitor/*"
        update-types:
          - minor
          - patch
      sentry:
        patterns:
          - "@sentry/*"
        update-types:
          - minor
          - patch
      tailwind:
        patterns:
          - "tailwindcss"
          - "tailwindcss-animate"
          - "tailwind-merge"
        update-types:
          - minor
          - patch
      drizzle:
        patterns:
          - "drizzle-orm"
          - "drizzle-kit"
        update-types:
          - minor
          - patch
      clerk:
        patterns:
          - "@clerk/*"
        update-types:
          - minor
          - patch
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "@playwright/*"
          - "jsdom"
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: "next"
        update-types:
          - major
      - dependency-name: "react"
        update-types:
          - major
      - dependency-name: "react-dom"
        update-types:
          - major

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Europe/Lisbon
    labels:
      - dependencies
      - automated
    commit-message:
      prefix: "chore"
      include: scope
